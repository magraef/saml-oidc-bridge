# Standalone Deployment Example with cert-manager
#
# This example shows how to deploy saml-oidc-bridge as a standalone service
# that acts as a SAML IdP for one or more SAML Service Provider applications.
#
# Features:
# - Automatic TLS certificate management via cert-manager
# - Horizontal pod autoscaling
# - Network policies for security
# - Production-ready configuration

---
apiVersion: v1
kind: Namespace
metadata:
  name: saml-oidc-bridge
  labels:
    name: saml-oidc-bridge
---
# Certificate for SAML signing (managed by cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: saml-signing-cert
  namespace: saml-oidc-bridge
spec:
  secretName: saml-oidc-bridge-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - saml-bridge.example.com
  usages:
    - digital signature
    - key encipherment
    - server auth
  # Certificate valid for 90 days, renewed automatically
  duration: 2160h # 90 days
  renewBefore: 720h # 30 days
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: saml-oidc-bridge-config
  namespace: saml-oidc-bridge
data:
  .env: |
    # OIDC Configuration
    OIDC_ISSUER_URL=https://accounts.google.com
    OIDC_CLIENT_ID=your-client-id.apps.googleusercontent.com
    OIDC_REDIRECT_URL=https://saml-bridge.example.com/oidc/callback
    OIDC_SCOPES=openid,profile,email
    
    # SAML IdP Configuration
    SAML_ENTITY_ID=https://saml-bridge.example.com/metadata
    SAML_ACS_URL=https://saml-bridge.example.com/saml/login
    SAML_CERTIFICATE_PATH=/certs/tls.crt
    SAML_PRIVATE_KEY_PATH=/certs/tls.key
    
    # Service Provider Configuration
    SP_ENTITY_ID=https://your-app.example.com/saml/metadata
    SP_ACS_URL=https://your-app.example.com/saml/acs
    
    # Attribute Mapping
    MAPPING_NAME_ID=email
    
    # Session Configuration
    SESSION_COOKIE_SECURE=true
    SESSION_COOKIE_NAME=saml-oidc-bridge-session
    
    # Server Configuration
    SERVER_ADDRESS=:8080
    DEBUG=false
    
    # Storage Configuration
    STORAGE_DATABASE_PATH=/data/saml-oidc-bridge.db
---
apiVersion: v1
kind: Secret
metadata:
  name: saml-oidc-bridge-secrets
  namespace: saml-oidc-bridge
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  oidc-client-secret: "your-oidc-client-secret-here"
  session-cookie-secret: "your-random-session-secret-32-bytes-minimum"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: saml-oidc-bridge-data
  namespace: saml-oidc-bridge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saml-oidc-bridge
  namespace: saml-oidc-bridge
  labels:
    app: saml-oidc-bridge
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: saml-oidc-bridge
  template:
    metadata:
      labels:
        app: saml-oidc-bridge
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      
      serviceAccountName: saml-oidc-bridge
      
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: saml-oidc-bridge-data
      - name: config
        configMap:
          name: saml-oidc-bridge-config
      - name: certs
        secret:
          secretName: saml-oidc-bridge-tls
      
      containers:
      - name: saml-oidc-bridge
        image: ghcr.io/your-org/saml-oidc-bridge:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        
        env:
        # Secrets from Secret
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: saml-oidc-bridge-secrets
              key: oidc-client-secret
        - name: SESSION_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: saml-oidc-bridge-secrets
              key: session-cookie-secret
        
        # Additional attribute mappings
        - name: MAPPING_ATTR_EMAIL
          value: "email"
        - name: MAPPING_ATTR_USERNAME
          value: "preferred_username"
        - name: MAPPING_ATTR_DISPLAYNAME
          value: "name"
        - name: MAPPING_ATTR_FIRSTNAME
          value: "given_name"
        - name: MAPPING_ATTR_LASTNAME
          value: "family_name"
        
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /app/.env
          subPath: .env
          readOnly: true
        - name: certs
          mountPath: /certs
          readOnly: true
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: saml-oidc-bridge
  namespace: saml-oidc-bridge
---
apiVersion: v1
kind: Service
metadata:
  name: saml-oidc-bridge
  namespace: saml-oidc-bridge
  labels:
    app: saml-oidc-bridge
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 600
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: saml-oidc-bridge
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saml-oidc-bridge
  namespace: saml-oidc-bridge
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - saml-bridge.example.com
    secretName: saml-bridge-ingress-tls
  rules:
  - host: saml-bridge.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: saml-oidc-bridge
            port:
              number: 80
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: saml-oidc-bridge
  namespace: saml-oidc-bridge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: saml-oidc-bridge
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: saml-oidc-bridge
  namespace: saml-oidc-bridge
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: saml-oidc-bridge
---
# Network Policy - Restrict ingress to only necessary traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: saml-oidc-bridge
  namespace: saml-oidc-bridge
spec:
  podSelector:
    matchLabels:
      app: saml-oidc-bridge
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow HTTPS to OIDC provider
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
  # Allow HTTP/HTTPS to SP
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
