# Production-Ready Standalone Deployment
#
# This example shows a production-ready deployment of saml-oidc-bridge
# with explicit environment variables and secrets for sensitive data.
#
# Prerequisites:
# 1. Create namespace: kubectl create namespace saml-oidc-bridge
# 2. Create secrets with your credentials (see below)
# 3. Update environment variables with your configuration
# 4. Ensure TLS certificates are available (via cert-manager or manual creation)
#
# Create secrets:
# kubectl create secret generic saml-oidc-bridge-oidc \
#   --from-literal=client-secret=your-oidc-client-secret \
#   -n saml-oidc-bridge
#
# kubectl create secret generic saml-oidc-bridge-session \
#   --from-literal=cookie-secret=$(openssl rand -base64 32) \
#   --from-literal=encryption-key=$(openssl rand -hex 32) \
#   -n saml-oidc-bridge
#
# kubectl create secret tls saml-oidc-bridge-tls \
#   --cert=tls.crt --key=tls.key \
#   -n saml-oidc-bridge
#

---
apiVersion: v1
kind: Namespace
metadata:
  name: saml-oidc-bridge
  labels:
    name: saml-oidc-bridge
---
# Secret for OIDC credentials
apiVersion: v1
kind: Secret
metadata:
  name: saml-oidc-bridge-oidc
  namespace: saml-oidc-bridge
type: Opaque
stringData:
  # OIDC client secret from your identity provider
  client-secret: "your-oidc-client-secret-here"
---
# Secret for session and encryption
apiVersion: v1
kind: Secret
metadata:
  name: saml-oidc-bridge-session
  namespace: saml-oidc-bridge
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  cookie-secret: "your-random-session-secret-32-bytes-minimum"
  # Generate with: openssl rand -hex 32
  encryption-key: "your-64-character-hex-encryption-key-for-aes256"

---
# Secret for TLS certificates (SAML signing)
# This can be managed by cert-manager or created manually
apiVersion: v1
kind: Secret
metadata:
  name: saml-oidc-bridge-tls
  namespace: saml-oidc-bridge
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and key
  # Create with: kubectl create secret tls saml-oidc-bridge-tls \
  #   --cert=tls.crt --key=tls.key -n saml-oidc-bridge
  tls.crt: LS0tLS1CRUdJTi...
  tls.key: LS0tLS1CRUdJTi...

---
# Persistent storage for SQLite database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: saml-oidc-bridge-data
  namespace: saml-oidc-bridge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saml-oidc-bridge
  namespace: saml-oidc-bridge
  labels:
    app: saml-oidc-bridge
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: saml-oidc-bridge
  template:
    metadata:
      labels:
        app: saml-oidc-bridge
        version: v1
    spec:
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: saml-oidc-bridge-data
      - name: certs
        secret:
          secretName: saml-oidc-bridge-tls
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
      
      containers:
      - name: saml-oidc-bridge
        image: ghcr.io/magraef/saml-oidc-bridge:latest
        imagePullPolicy: Always
        
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        
        env:
        # OIDC Provider Configuration
        - name: OIDC_ISSUER_URL
          value: "https://accounts.google.com"
        - name: OIDC_CLIENT_ID
          value: "your-client-id.apps.googleusercontent.com"
        - name: OIDC_SCOPES
          value: "openid,profile,email"
        
        # OIDC Client Secret (from secret)
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: saml-oidc-bridge-oidc
              key: client-secret
        
        # Bridge Base URL (all endpoints derived from this)
        - name: IDP_URL
          value: "https://saml-bridge.example.com"
        
        # Service Provider Configuration
        - name: SP_ENTITY_ID
          value: "https://your-app.example.com/saml/metadata"
        - name: SP_ACS_URL
          value: "https://your-app.example.com/saml/acs"
        
        # Attribute Mapping
        - name: MAPPING_NAME_ID
          value: "email"
        - name: MAPPING_ATTR_EMAIL
          value: "email"
        - name: MAPPING_ATTR_USERNAME
          value: "preferred_username"
        - name: MAPPING_ATTR_DISPLAYNAME
          value: "name"
        - name: MAPPING_ATTR_FIRSTNAME
          value: "given_name"
        - name: MAPPING_ATTR_LASTNAME
          value: "family_name"
        
        # Session Configuration (secrets from secret)
        - name: SESSION_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: saml-oidc-bridge-session
              key: cookie-secret
        - name: SESSION_COOKIE_SECURE
          value: "true"
        - name: SESSION_COOKIE_NAME
          value: "saml-oidc-bridge-session"
        
        # Storage Configuration
        - name: STORAGE_DATABASE_PATH
          value: "/data/saml-oidc-bridge.db"
        - name: STORAGE_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: saml-oidc-bridge-session
              key: encryption-key
        
        # SAML Certificate Configuration
        - name: SAML_CERTIFICATE_PATH
          value: "/certs/tls.crt"
        - name: SAML_PRIVATE_KEY_PATH
          value: "/certs/tls.key"
        
        # Server Configuration
        - name: SERVER_ADDRESS
          value: ":8080"
        - name: DEBUG
          value: "false"
        
        volumeMounts:
        - name: data
          mountPath: /data
        - name: certs
          mountPath: /certs
          readOnly: true
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
---
apiVersion: v1
kind: Service
metadata:
  name: saml-oidc-bridge
  namespace: saml-oidc-bridge
  labels:
    app: saml-oidc-bridge
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 600
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: saml-oidc-bridge
