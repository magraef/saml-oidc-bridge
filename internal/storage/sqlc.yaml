version: "2"
sql:
  - engine: "sqlite"
    queries:
      - "./sql/queries.sql"
      - "./sql/commands.sql"
    schema: "./sql/schema.sql"
    gen:
      go:
        package: "storage"
        out: "."
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
